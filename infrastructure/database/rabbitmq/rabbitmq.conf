# RabbitMQ configuration for video converter microservices
# Optimized for video processing workflows and high throughput

# Networking
listeners.tcp.default = 5672
management.tcp.port = 15672

# Authentication and Authorization
default_user = admin
default_pass = admin_password_123
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# Virtual Hosts
default_vhost = video_converter

# Memory and Disk Management
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 2.0

# Message Store
msg_store_file_size_limit = 16777216
msg_store_credit_disc_bound = 4000

# Queue Settings
queue_master_locator = min-masters

# Clustering (for future scaling)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq-1

# Logging
log.console = true
log.console.level = info
log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.size = 10485760

# Management Plugin
management.rates_mode = basic

# Performance Tuning
channel_max = 2047
connection_backlog = 128
heartbeat = 60
frame_max = 131072

# SSL/TLS (disabled for development)
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

# Policies for High Availability
# These will be set via management API or definitions file