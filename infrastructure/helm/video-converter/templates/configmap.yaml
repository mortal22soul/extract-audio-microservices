{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-gateway-config
  labels:
    {{- include "video-converter.gateway.labels" . | nindent 4 }}
data:
  PORT: "8080"
  MONGODB_URI: "mongodb://{{ include "video-converter.fullname" . }}-mongodb:27017/videoconverter"
  REDIS_URL: "redis://:{{ .Values.redis.auth.password }}@{{ include "video-converter.fullname" . }}-redis-master:6379"
  AUTH_SERVICE_URL: "{{ include "video-converter.fullname" . }}-auth:50051"
  ANALYTICS_SERVICE_URL: "{{ include "video-converter.fullname" . }}-analytics:8000"
  MAX_FILE_SIZE: "100MB"
  UPLOAD_TIMEOUT: "300s"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60s"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "*"
---
{{- end }}

{{- if .Values.auth.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-auth-config
  labels:
    {{- include "video-converter.auth.labels" . | nindent 4 }}
data:
  PORT: "50051"
  HTTP_PORT: "8081"
  POSTGRES_HOST: "{{ include "video-converter.fullname" . }}-postgresql"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "{{ .Values.postgresql.auth.database }}"
  JWT_EXPIRY: "24h"
  REFRESH_TOKEN_EXPIRY: "168h"
  BCRYPT_COST: "12"
  LOG_LEVEL: "info"
---
{{- end }}

{{- if .Values.converter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-converter-config
  labels:
    {{- include "video-converter.converter.labels" . | nindent 4 }}
data:
  MONGODB_URI: "mongodb://{{ include "video-converter.fullname" . }}-mongodb:27017/videoconverter"
  RABBITMQ_URL: "amqp://{{ .Values.rabbitmq.auth.username }}:{{ .Values.rabbitmq.auth.password }}@{{ include "video-converter.fullname" . }}-rabbitmq:5672/"
  REDIS_URL: "redis://:{{ .Values.redis.auth.password }}@{{ include "video-converter.fullname" . }}-redis-master:6379"
  WORKER_POOL_SIZE: "5"
  MAX_CONCURRENT_JOBS: "10"
  TEMP_DIR: "/tmp/conversions"
  FFMPEG_QUALITY: "192k"
  LOG_LEVEL: "info"
---
{{- end }}

{{- if .Values.analytics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-analytics-config
  labels:
    {{- include "video-converter.analytics.labels" . | nindent 4 }}
data:
  PORT: "8000"
  MONGODB_URI: "mongodb://{{ include "video-converter.fullname" . }}-mongodb:27017/videoconverter"
  RABBITMQ_URL: "amqp://{{ .Values.rabbitmq.auth.username }}:{{ .Values.rabbitmq.auth.password }}@{{ include "video-converter.fullname" . }}-rabbitmq:5672/"
  REDIS_URL: "redis://:{{ .Values.redis.auth.password }}@{{ include "video-converter.fullname" . }}-redis-master:6379"
  ML_MODEL_PATH: "/app/models"
  THUMBNAIL_COUNT: "3"
  QUALITY_THRESHOLD: "0.7"
  LOG_LEVEL: "info"
---
{{- end }}

{{- if .Values.realtime.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-realtime-config
  labels:
    {{- include "video-converter.realtime.labels" . | nindent 4 }}
data:
  PORT: "3001"
  REDIS_URL: "redis://:{{ .Values.redis.auth.password }}@{{ include "video-converter.fullname" . }}-redis-master:6379"
  CORS_ORIGINS: "*"
  HEARTBEAT_INTERVAL: "30000"
  CONNECTION_TIMEOUT: "60000"
  LOG_LEVEL: "info"
---
{{- end }}

{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-frontend-config
  labels:
    {{- include "video-converter.frontend.labels" . | nindent 4 }}
data:
  PORT: "3000"
  NEXT_PUBLIC_API_URL: "http://{{ include "video-converter.fullname" . }}-gateway:8080"
  NEXT_PUBLIC_REALTIME_URL: "http://{{ include "video-converter.fullname" . }}-realtime:3001"
  NODE_ENV: "{{ .Values.app.environment }}"
---
{{- end }}

{{- if .Values.notification.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "video-converter.fullname" . }}-notification-config
  labels:
    {{- include "video-converter.notification.labels" . | nindent 4 }}
data:
  RABBITMQ_URL: "amqp://{{ .Values.rabbitmq.auth.username }}:{{ .Values.rabbitmq.auth.password }}@{{ include "video-converter.fullname" . }}-rabbitmq:5672/"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@videoconverter.com"
  TEMPLATE_DIR: "/app/templates"
  LOG_LEVEL: "info"
---
{{- end }}