apiVersion: v1
kind: Secret
metadata:
  name: {{ include "video-converter.fullname" . }}-secrets
  labels:
    {{- include "video-converter.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "{{ .Values.postgresql.auth.username }}"
  POSTGRES_PASSWORD: "{{ .Values.postgresql.auth.password }}"
  MONGODB_USERNAME: "{{ .Values.mongodb.auth.username }}"
  MONGODB_PASSWORD: "{{ .Values.mongodb.auth.password }}"
  REDIS_PASSWORD: "{{ .Values.redis.auth.password }}"
  
  # JWT secrets
  JWT_SECRET: "{{ .Values.auth.jwtSecret | default "change-me-in-production" }}"
  JWT_REFRESH_SECRET: "{{ .Values.auth.jwtRefreshSecret | default "change-me-in-production-refresh" }}"
  
  # RabbitMQ credentials
  RABBITMQ_USERNAME: "{{ .Values.rabbitmq.auth.username }}"
  RABBITMQ_PASSWORD: "{{ .Values.rabbitmq.auth.password }}"
  
  # SMTP credentials
  SMTP_USERNAME: "{{ .Values.notification.smtp.username | default "your-smtp-username" }}"
  SMTP_PASSWORD: "{{ .Values.notification.smtp.password | default "your-smtp-password" }}"
  
  # API keys and external services
  ANALYTICS_API_KEY: "{{ .Values.analytics.apiKey | default "analytics-api-key-123" }}"