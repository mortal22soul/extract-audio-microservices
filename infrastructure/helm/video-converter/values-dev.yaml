# Development environment values
app:
  environment: development

# Reduced resources for development
gateway:
  replicaCount: 1
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  autoscaling:
    enabled: false

auth:
  replicaCount: 1
  resources:
    requests:
      memory: '64Mi'
      cpu: '50m'
    limits:
      memory: '128Mi'
      cpu: '100m'
  autoscaling:
    enabled: false

converter:
  replicaCount: 1
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '1Gi'
      cpu: '500m'
  autoscaling:
    enabled: false

analytics:
  replicaCount: 1
  resources:
    requests:
      memory: '512Mi'
      cpu: '250m'
    limits:
      memory: '2Gi'
      cpu: '1000m'
  autoscaling:
    enabled: false

realtime:
  replicaCount: 1
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  autoscaling:
    enabled: false

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  autoscaling:
    enabled: false

notification:
  replicaCount: 1
  resources:
    requests:
      memory: '64Mi'
      cpu: '50m'
    limits:
      memory: '128Mi'
      cpu: '100m'
  autoscaling:
    enabled: false

# Development ingress
ingress:
  hosts:
    - host: video-converter.dev.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /realtime
          pathType: Prefix
          service: realtime
  tls:
    - secretName: video-converter-dev-tls
      hosts:
        - video-converter.dev.local

# Reduced database resources
postgresql:
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        memory: '128Mi'
        cpu: '100m'
      limits:
        memory: '512Mi'
        cpu: '500m'

mongodb:
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '1Gi'
      cpu: '500m'

redis:
  master:
    persistence:
      size: 2Gi
    resources:
      requests:
        memory: '128Mi'
        cpu: '100m'
      limits:
        memory: '256Mi'
        cpu: '250m'

rabbitmq:
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '512Mi'
      cpu: '500m'

# Disable monitoring in dev
monitoring:
  enabled: false

# Disable backup in dev
backup:
  enabled: false
