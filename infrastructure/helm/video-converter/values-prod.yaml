# Production environment values
app:
  environment: production

# Production ingress
ingress:
  hosts:
    - host: video-converter.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /realtime
          pathType: Prefix
          service: realtime
  tls:
    - secretName: video-converter-prod-tls
      hosts:
        - video-converter.example.com

# Production resources - full scale
gateway:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70

auth:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

converter:
  replicaCount: 5
  autoscaling:
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

analytics:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75

realtime:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

frontend:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

notification:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

# Production database configurations with high availability
postgresql:
  primary:
    persistence:
      size: 100Gi
    resources:
      requests:
        memory: '1Gi'
        cpu: '500m'
      limits:
        memory: '4Gi'
        cpu: '2000m'

mongodb:
  persistence:
    size: 500Gi
  resources:
    requests:
      memory: '2Gi'
      cpu: '1000m'
    limits:
      memory: '8Gi'
      cpu: '4000m'

redis:
  master:
    persistence:
      size: 50Gi
    resources:
      requests:
        memory: '1Gi'
        cpu: '500m'
      limits:
        memory: '4Gi'
        cpu: '2000m'

rabbitmq:
  persistence:
    size: 100Gi
  resources:
    requests:
      memory: '2Gi'
      cpu: '1000m'
    limits:
      memory: '8Gi'
      cpu: '4000m'

# Full monitoring in production
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  grafana:
    enabled: true
    dashboards:
      enabled: true

# Production backup configuration
backup:
  enabled: true
  schedule: '0 1 * * *' # Daily at 1 AM
  retention: 30 # Keep 30 days
  storage:
    size: 200Gi
