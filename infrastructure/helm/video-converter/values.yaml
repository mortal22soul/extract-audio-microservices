# Default values for video-converter
# This is a YAML-formatted file.

global:
  imageRegistry: ''
  imagePullSecrets: []
  storageClass: 'standard'

# Application configuration
app:
  name: video-converter
  version: '1.0.0'
  environment: development

# Gateway Service
gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: gateway-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Auth Service
auth:
  enabled: true
  replicaCount: 2
  image:
    repository: auth-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    grpcPort: 50051
    httpPort: 8081
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Converter Service
converter:
  enabled: true
  replicaCount: 3
  image:
    repository: converter-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      memory: '512Mi'
      cpu: '500m'
    limits:
      memory: '2Gi'
      cpu: '1000m'
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85

# Analytics Service
analytics:
  enabled: true
  replicaCount: 2
  image:
    repository: analytics-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: '1Gi'
      cpu: '500m'
    limits:
      memory: '4Gi'
      cpu: '2000m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

# Realtime Service
realtime:
  enabled: true
  replicaCount: 2
  image:
    repository: realtime-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Frontend Service
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: frontend-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: '256Mi'
      cpu: '250m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Notification Service
notification:
  enabled: true
  replicaCount: 2
  image:
    repository: notification-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Ingress configuration
ingress:
  enabled: true
  className: 'nginx'
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
  hosts:
    - host: video-converter.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /realtime
          pathType: Prefix
          service: realtime
  tls:
    - secretName: video-converter-tls
      hosts:
        - video-converter.local

# Database configurations
postgresql:
  enabled: true
  auth:
    postgresPassword: 'postgres_password_123'
    username: 'auth_user'
    password: 'auth_password_123'
    database: 'auth'
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: '256Mi'
        cpu: '250m'
      limits:
        memory: '1Gi'
        cpu: '1000m'

mongodb:
  enabled: true
  auth:
    rootPassword: 'mongo_root_password_123'
    username: 'mongo_user'
    password: 'mongo_password_123'
    database: 'videoconverter'
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: '512Mi'
      cpu: '500m'
    limits:
      memory: '2Gi'
      cpu: '1000m'

redis:
  enabled: true
  auth:
    enabled: true
    password: 'dev123'
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: '256Mi'
        cpu: '250m'
      limits:
        memory: '512Mi'
        cpu: '500m'

rabbitmq:
  enabled: true
  auth:
    username: 'admin'
    password: 'dev123'
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: '512Mi'
      cpu: '500m'
    limits:
      memory: '1Gi'
      cpu: '1000m'

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Pod security context
podSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ''

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  grafana:
    enabled: true
    dashboards:
      enabled: true

# Backup configuration
backup:
  enabled: true
  schedule: '0 2 * * *'
  retention: 7
  storage:
    size: 50Gi
