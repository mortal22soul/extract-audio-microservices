apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  labels:
    app: mongodb
data:
  MONGO_INITDB_DATABASE: 'videoconverter'
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: 'root'
  MONGO_INITDB_ROOT_PASSWORD: 'mongo_root_password_123'
  MONGODB_USERNAME: 'mongo_user'
  MONGODB_PASSWORD: 'mongo_password_123'
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
  selector:
    app: mongodb
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  labels:
    app: mongodb
spec:
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
  selector:
    app: mongodb
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  serviceName: mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mongodb-config
            - secretRef:
                name: mongodb-secret
          resources:
            requests:
              memory: '512Mi'
              cpu: '50m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-config-volume
              mountPath: /docker-entrypoint-initdb.d
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mongodb-config-volume
          configMap:
            name: mongodb-init-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          app: mongodb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-scripts
  labels:
    app: mongodb
data:
  01-init-videoconverter-db.js: |
    // Switch to videoconverter database
    db = db.getSiblingDB('videoconverter');

    // Create user for the application
    db.createUser({
      user: 'mongo_user',
      pwd: 'mongo_password_123',
      roles: [
        {
          role: 'readWrite',
          db: 'videoconverter'
        }
      ]
    });

    // Create collections with indexes
    db.createCollection('videos');
    db.videos.createIndex({ "userId": 1 });
    db.videos.createIndex({ "status": 1 });
    db.videos.createIndex({ "uploadedAt": -1 });

    db.createCollection('conversion_jobs');
    db.conversion_jobs.createIndex({ "videoId": 1 });
    db.conversion_jobs.createIndex({ "userId": 1 });
    db.conversion_jobs.createIndex({ "status": 1 });
    db.conversion_jobs.createIndex({ "startedAt": -1 });


    print('MongoDB initialization completed successfully');
