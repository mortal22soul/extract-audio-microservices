# PostgreSQL Restore Job Template
# Usage: kubectl create job --from=cronjob/postgresql-restore postgresql-restore-$(date +%Y%m%d)
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-restore-template
  labels:
    app: postgresql-restore
spec:
  template:
    spec:
      containers:
        - name: postgres-restore
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              if [ -z "$BACKUP_FILE" ]; then
                echo "Error: BACKUP_FILE environment variable not set"
                exit 1
              fi

              if [ ! -f "/backup/$BACKUP_FILE" ]; then
                echo "Error: Backup file /backup/$BACKUP_FILE not found"
                exit 1
              fi

              echo "Restoring PostgreSQL from $BACKUP_FILE..."

              # Drop existing database and recreate
              dropdb -h postgresql -U $POSTGRES_USER $POSTGRES_DB --if-exists
              createdb -h postgresql -U $POSTGRES_USER $POSTGRES_DB

              # Restore from backup
              psql -h postgresql -U $POSTGRES_USER -d $POSTGRES_DB < /backup/$BACKUP_FILE

              echo "PostgreSQL restore completed successfully"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgresql-config
                  key: POSTGRES_DB
            - name: BACKUP_FILE
              value: '' # Set this when creating the job
          volumeMounts:
            - name: backup-storage
              mountPath: /backup
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-storage-pvc
      restartPolicy: Never
  backoffLimit: 3
---
# MongoDB Restore Job Template
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-restore-template
  labels:
    app: mongodb-restore
spec:
  template:
    spec:
      containers:
        - name: mongo-restore
          image: mongo:7.0
          command:
            - /bin/sh
            - -c
            - |
              if [ -z "$BACKUP_DIR" ]; then
                echo "Error: BACKUP_DIR environment variable not set"
                exit 1
              fi

              if [ ! -d "/backup/$BACKUP_DIR" ]; then
                echo "Error: Backup directory /backup/$BACKUP_DIR not found"
                exit 1
              fi

              echo "Restoring MongoDB from $BACKUP_DIR..."

              # Drop existing database
              mongosh --host mongodb:27017 --username $MONGODB_USERNAME --password $MONGODB_PASSWORD --authenticationDatabase videoconverter --eval "db.getSiblingDB('videoconverter').dropDatabase()"

              # Restore from backup
              mongorestore --host mongodb:27017 --username $MONGODB_USERNAME --password $MONGODB_PASSWORD --authenticationDatabase videoconverter --db videoconverter /backup/$BACKUP_DIR/videoconverter

              echo "MongoDB restore completed successfully"
          env:
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_USERNAME
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_PASSWORD
            - name: BACKUP_DIR
              value: '' # Set this when creating the job
          volumeMounts:
            - name: backup-storage
              mountPath: /backup
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-storage-pvc
      restartPolicy: Never
  backoffLimit: 3
---
# Redis Restore Job Template
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-restore-template
  labels:
    app: redis-restore
spec:
  template:
    spec:
      containers:
        - name: redis-restore
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              if [ -z "$BACKUP_FILE" ]; then
                echo "Error: BACKUP_FILE environment variable not set"
                exit 1
              fi

              if [ ! -f "/backup/$BACKUP_FILE" ]; then
                echo "Error: Backup file /backup/$BACKUP_FILE not found"
                exit 1
              fi

              echo "Restoring Redis from $BACKUP_FILE..."

              # Flush existing data
              redis-cli -h redis -a $REDIS_PASSWORD FLUSHALL

              # Restore from backup (this requires stopping Redis temporarily)
              echo "Note: Redis restore requires manual intervention to replace dump.rdb file"
              echo "Backup file available at: /backup/$BACKUP_FILE"

              echo "Redis restore preparation completed"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: BACKUP_FILE
              value: '' # Set this when creating the job
          volumeMounts:
            - name: backup-storage
              mountPath: /backup
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-storage-pvc
      restartPolicy: Never
  backoffLimit: 3
