apiVersion: apps/v1
kind: Deployment
metadata:
  name: converter-service
  labels:
    app: converter-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: converter-service
  template:
    metadata:
      labels:
        app: converter-service
        version: v1
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8082'
        prometheus.io/path: '/metrics'
    spec:
      containers:
        - name: converter
          image: converter-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: converter-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: '512Mi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp/conversions
            - name: ffmpeg-cache
              mountPath: /app/cache
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: temp-storage
          emptyDir:
            sizeLimit: 10Gi
        - name: ffmpeg-cache
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: converter-service
  labels:
    app: converter-service
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8082'
spec:
  selector:
    app: converter-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
  type: ClusterIP
